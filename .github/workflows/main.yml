name: Sincronizacion Meteo-40

on:
  schedule:
    - cron: '*/5 * * * *' # Se ejecuta cada 5 minutos automáticamente
  workflow_dispatch: # Esto nos permite darle al botón de "Play" manualmente

jobs:
  sincronizar:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código del repositorio
        uses: actions/checkout@v3
        
      - name: Configurar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          
      - name: Instalar libreria de Supabase
        run: npm install @supabase/supabase-js
        
      - name: Ejecutar el script sync.js
        run: node sync.js
        env:
          AMMONITOR_TOKEN: ${{ secrets.AMMONITOR_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PROJECT_KEY: 'PMXG'
